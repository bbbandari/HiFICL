defaults:
  - _self_
  - exp_settings

resume: True
query_set: ${data.name}
query_set_size: null # the number of samples to evaluate. if set to null, all samples will be evaluated.
support_set: ${data.name}
ckpt_path: null
batch_size: 4  # Reduced from 16 to save memory
iterations: null
max_skip_oom: 5 # Allow skipping OOM samples
generation_args:
  num_beams: 1  # Reduced from 3 to save memory
  max_new_tokens: 20  # Increased to allow complete answers
  length_penalty: 0.0