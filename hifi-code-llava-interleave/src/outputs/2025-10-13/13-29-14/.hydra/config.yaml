resume: true
query_set: ${data.name}
query_set_size: null
support_set: ${data.name}
ckpt_path: /root/autodl-tmp/origin_exp_idv1/results/ckpt/mimic_v3-idefics-9b-coco-1000-8shot/epoch-3
batch_size: 4
iterations: null
max_skip_oom: 5
