runname: fidel_v3
resume: true
lr: ${peft.lr}
weight_decay: 0.001
warmup_step: 0.1
batch_size: 2
epochs: ${peft.max_epochs}
ce_loss_weight: ${peft.ce_loss_weight}
align_loss_weight: ${peft.align_loss_weight}
strategy: deepspeed_stage_2_offload
accumulate_grad_batches: 2
grad_clip_val: 1.0
precision: 16-mixed
save_when_override: true
model_name: idefics-9b
dtype: torch.float16
encoder:
  model_strategy: Strategy.LM_LOSS
  cls:
    _target_: src.shift_encoder.AttnApproximatorDirect_final
    attn_strategy: ShiftStrategy.VECTOR_SHIFT | ShiftStrategy.LEARNABLE_SHIFT_SCALE
      | ShiftStrategy.MULTI_HEAD
    ffn_strategy: ShiftStrategy.RECORD_HIDDEN_STATES
    num_virtual_tokens: 32
    lora_rank: 1
peft:
  name: mimic_v8
  ce_loss_weight: 1.0
  align_loss_weight: 0
  lr: 0.005
  max_epochs: 5
data:
  is_icl: false
  seed: 3407
  num_query_samples: 1000
  name: ok_vqa
  num_shot: 5
  num_workers: 5
  num_image_in_query: 1
