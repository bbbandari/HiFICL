resume: false
query_set: ${data.name}
query_set_size: null
support_set: ${data.name}
ckpt_path: null
batch_size: 2
iterations: 10
max_skip_oom: 5
eval_all_epochs: false
generation_args:
  num_beams: 1
  max_new_tokens: 10
  length_penalty: 0.0
model_name: llava-interleave-7b
dtype: torch.float16
encoder:
  model_strategy: Strategy.LM_LOSS | Strategy.LAYER_WISE_MSE
  cls:
    _target_: src.shift_encoder.AttnApproximator
    attn_strategy: ShiftStrategy.VECTOR_SHIFT | ShiftStrategy.LEARNABLE_SHIFT_SCALE
      | ShiftStrategy.MULTI_HEAD
    ffn_strategy: ShiftStrategy.RECORD_HIDDEN_STATES
peft:
  name: mimic
  ce_loss_weight: 0.5
  align_loss_weight: 1
  lr: 0.005
  max_epochs: 10
data:
  is_icl: false
  seed: 3407
  num_query_samples: 200
  name: vqav2
  num_shot: 8
  num_workers: 5
  num_image_in_query: 1
