runname: adaora_v1-idev2-r-16
resume: true
lr: ${peft.lr}
weight_decay: 0.001
warmup_step: 0.1
batch_size: 2
epochs: 5
ce_loss_weight: ${peft.ce_loss_weight}
align_loss_weight: ${peft.align_loss_weight}
strategy: deepspeed_stage_2_offload
accumulate_grad_batches: 2
grad_clip_val: 1.0
precision: 16-mixed
save_when_override: false
model_name: llava-interleave-7b
dtype: torch.float16
encoder:
  model_strategy: Strategy.LM_LOSS
  cls:
    _target_: src.shift_encoder.AttnFFNShift
    ffn_strategy: null
    attn_strategy: null
peft:
  name: ada_lora
  ce_loss_weight: 1
  align_loss_weight: 0
  lr: 0.0005
  r: 8
  init_r: 12
  target_r: 8
  tinit: 0
  tfinal: 0
  deltaT: 1
  lora_dropout: 0.05
  max_epochs: 10
  idefics-9b:
    task_type: CAUSAL_LM
    init_r: ${..init_r}
    r: ${..target_r}
    target_modules:
    - q_proj
    - k_proj
    - o_proj
    - v_proj
    lora_alpha: ${eval:'${..init_r} * 2'}
    lora_dropout: ${..lora_dropout}
    tinit: ${..tinit}
    tfinal: ${..tfinal}
    deltaT: ${..deltaT}
  idefics2-8b-base:
    task_type: CAUSAL_LM
    init_r: ${..init_r}
    r: ${..target_r}
    target_modules:
    - q_proj
    - k_proj
    - o_proj
    - v_proj
    lora_alpha: ${eval:'${..init_r} * 2'}
    lora_dropout: ${..lora_dropout}
    tinit: ${..tinit}
    tfinal: ${..tfinal}
    deltaT: ${..deltaT}
  llava-interleave-7b:
    task_type: CAUSAL_LM
    init_r: ${..init_r}
    r: ${..target_r}
    target_modules:
    - q_proj
    - k_proj
    - o_proj
    - v_proj
    lora_alpha: ${eval:'${..init_r} * 2'}
    lora_dropout: ${..lora_dropout}
    tinit: ${..tinit}
    tfinal: ${..tfinal}
    deltaT: ${..deltaT}
data:
  is_icl: false
  seed: 3407
  num_query_samples: 1000
  name: coco
  num_shot: 1
  num_workers: 5
  num_image_in_query: 1
